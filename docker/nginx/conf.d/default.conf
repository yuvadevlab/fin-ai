# ==============================================================================
# Virtual Host Configuration for FinAI Infrastructure
# Routes traffic: / -> web (Next.js) & /api -> api (NestJS)
# ==============================================================================

# Upstream Server Pools (Docker DNS Resolution)
upstream fin_ai_web {
    server web:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream fin_ai_api {
    server api:4000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# ------------------------------------------------------------------------------
# HTTP Server Block (Port 80)
# Handles Certbot ACME Challenges & HTTP to HTTPS Redirection
# ------------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Certbot ACME Webroot Challenge Location
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all HTTP requests to HTTPS (Uncomment when SSL is installed)
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Fallback HTTP reverse proxy handling (Active before SSL configuration)
    location /api/ {
        limit_req zone=api_rate_limit burst=30 nodelay;

        proxy_pass http://fin_ai_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    location / {
        limit_req zone=general_rate_limit burst=50 nodelay;

        proxy_pass http://fin_ai_web/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ------------------------------------------------------------------------------
# HTTPS Server Block (Port 443 - SSL/TLS Enabled)
# ------------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # SSL Certificates (Cloudflare Origin Cert or Let's Encrypt Certbot)
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # SSL Parameters & Security Protocols
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Security Headers (OWASP Hardening Standards)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' http: https: ws: wss:;" always;

    # Auth Rate Limiting for Sensitive Endpoints
    location /api/auth/login {
        limit_req zone=auth_rate_limit burst=5 nodelay;
        proxy_pass http://fin_ai_api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Proxy Routing
    location /api/ {
        limit_req zone=api_rate_limit burst=30 nodelay;

        proxy_pass http://fin_ai_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Next.js Static Asset Caching (_next/static)
    location /_next/static/ {
        proxy_pass http://fin_ai_web/_next/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Web App Proxy Routing
    location / {
        limit_req zone=general_rate_limit burst=50 nodelay;

        proxy_pass http://fin_ai_web/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
