# ==============================================================================
# Nginx Core Configuration for FinAI Infrastructure
# Optimized for performance, security, caching, and reverse proxying
# ==============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Log Format Definition (Structured for JSON / APM ingestion)
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance Optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off; # Hide Nginx version for security

    # Request Body Limits (Prevents buffer overflow / memory exhaust)
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # Rate Limiting Zones (Leaky Bucket Algorithm)
    # Zone 1: General IP rate limit (30 requests/sec, burst=50)
    limit_req_zone $binary_remote_addr zone=general_rate_limit:10m rate=30r/s;
    # Zone 2: API rate limit (15 requests/sec, burst=30)
    limit_req_zone $binary_remote_addr zone=api_rate_limit:10m rate=15r/s;
    # Zone 3: Auth rate limit (3 requests/sec to prevent brute-force)
    limit_req_zone $binary_remote_addr zone=auth_rate_limit:10m rate=3r/s;

    # Gzip Compression Setup
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/svg+xml
        image/x-icon
        text/css
        text/plain
        text/x-component;

    # Proxy Caching & Buffering Configurations
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Include Virtual Server Virtual Host Configurations
    include /etc/nginx/conf.d/*.conf;
}
