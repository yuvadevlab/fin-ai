name: Continuous Deployment (Windows Server)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Codebase (Lint, Typecheck, Test, Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup pnpm Package Manager
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Monorepo Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Database Client
        run: pnpm db:generate

      - name: Execute ESLint Check
        run: pnpm lint

      - name: Execute TypeScript Type Check
        run: pnpm typecheck

      - name: Run Unit Tests (Vitest)
        run: pnpm test

      - name: Execute Monorepo Turbo Build
        run: pnpm build

  deploy:
    name: Production Deployment to Windows Server
    runs-on: ubuntu-latest
    needs: [validate] # Ensures deployment only occurs after validation passes

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Trigger Remote Deployment on Windows Server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.WINDOWS_SERVER_HOST }}
          username: ${{ secrets.WINDOWS_SERVER_USER }}
          password: ${{ secrets.WINDOWS_SERVER_PASSWORD }}
          port: ${{ secrets.WINDOWS_SERVER_SSH_PORT || 22 }}
          script: |
            cd D:\server\repos\fin-ai
            powershell -ExecutionPolicy Bypass -File .\scripts\deploy.ps1 -Branch main

      - name: Trigger Automatic Rollback on Failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.WINDOWS_SERVER_HOST }}
          username: ${{ secrets.WINDOWS_SERVER_USER }}
          password: ${{ secrets.WINDOWS_SERVER_PASSWORD }}
          port: ${{ secrets.WINDOWS_SERVER_SSH_PORT || 22 }}
          script: |
            cd D:\server\repos\fin-ai
            powershell -ExecutionPolicy Bypass -File .\scripts\rollback.ps1 -TargetCommit HEAD~1
