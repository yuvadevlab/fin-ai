name: 🚢 Continuous Deployment (Windows Server)

on:
  push:
    branches: [main]
  workflow_dispatch:

# 🔒 Prevents overlapping concurrent production deployments
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: 🛡️ Pre-Deployment Validation (Lint, Typecheck, Test, Build)
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Code Repository
        uses: actions/checkout@v4

      - name: ⚡ Setup pnpm Package Manager
        uses: pnpm/action-setup@v4

      - name: 🟢 Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: 📥 Install Monorepo Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🗄️ Generate Prisma Database Client
        run: pnpm db:generate

      - name: 🧹 Execute ESLint Check
        run: pnpm lint

      - name: 🔎 Execute TypeScript Type Check
        run: pnpm typecheck

      - name: 🧪 Run Unit Tests (Vitest)
        run: pnpm test

      - name: 🏗️ Execute Monorepo Turbo Build
        run: pnpm build

  deploy:
    name: 🚀 Production Deployment on Windows Host
    runs-on: [self-hosted, Windows]
    needs: [validate]

    steps:
      - name: 📦 Checkout Code Repository
        uses: actions/checkout@v4

      - name: 🖥️ Execute PowerShell Deployment Script
        run: powershell -ExecutionPolicy Bypass -Command "Set-Location -Path 'D:\server\repos\fin-ai'; git pull origin main; .\scripts\deploy.ps1 -Branch main"

      - name: 🔄 Trigger Automatic Rollback on Failure
        if: failure()
        run: powershell -ExecutionPolicy Bypass -Command "Set-Location -Path 'D:\server\repos\fin-ai'; .\scripts\rollback.ps1 -TargetCommit HEAD~1"
