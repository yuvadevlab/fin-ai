name: 🛡️ Build & Quality Validation

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

# ⚡ Prevents duplicate/redundant parallel workflow runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: 🔍 Lint, Typecheck, Test & Build Monorepo
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Code Repository
        uses: actions/checkout@v4

      - name: ⚡ Setup pnpm Package Manager
        uses: pnpm/action-setup@v4

      - name: 🟢 Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: 📥 Install Monorepo Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🗄️ Generate Prisma Database Client
        run: pnpm db:generate

      - name: 🧹 Execute ESLint Code Check
        run: pnpm lint

      - name: 🔎 Execute TypeScript Type Check
        run: pnpm typecheck

      - name: 🧪 Run Unit Tests (Vitest)
        run: pnpm test

      - name: 🏗️ Execute Monorepo Turbo Build
        run: pnpm build
